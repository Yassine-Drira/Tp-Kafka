# Identifiant unique du nœud (entier >= 0)
node.id=1

# Le rôle : à la fois broker et controller
process.roles=broker,controller

# Quorum des controllers
controller.quorum.voters=1@localhost:9093

# Adresse d'écoute
listeners=PLAINTEXT://:9092,CONTROLLER://:9093

# Adresse annoncée aux clients
advertised.listeners=PLAINTEXT://localhost:9092

# Nom du listener pour les communications inter-controller
controller.listener.names=CONTROLLER

# Mapping des protocoles
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

# Répertoire des logs (IMPORTANT: Utilisez un chemin Windows valide)
log.dirs=C:/kafka-logs-tp

# Pour un environnement de TP — on autorise la création automatique de topics
auto.create.topics.enable=true

# Tolérance à 1 broker
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
